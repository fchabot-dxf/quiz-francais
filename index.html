<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz TECFÉE - Expert BDL</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="index.css">
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-presets="react" data-type="module">
        import { QUIZ_DATA } from './js/data/index.js';

        const { useState, useEffect, Fragment } = React;

        /* UTILS */
        const shuffleArray = (array) => {
            const newArr = [...array];
            for (let i = newArr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [newArr[i], newArr[j]] = [newArr[j], newArr[i]];
            }
            return newArr;
        };

        /* ICONS */
        const Icon = ({ children, size = 24, className, viewBox = "0 0 24 24" }) => (
            <span className={className}>
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox={viewBox} fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                    {children}
                </svg>
            </span>
        );
        const BrainCircuit = (props) => <Icon {...props}><path d="M12 4.5V4a2 2 0 0 0-4 0v.5"/><path d="M20 11a8 8 0 0 0-16 0"/><path d="M17.6 20.5a9.7 9.7 0 0 0 1.4-1.5"/><path d="M6.4 20.5a9.7 9.7 0 0 1-1.4-1.5"/><path d="M12 11V5"/><path d="M12 21v-4"/><path d="M16 11l-3 3"/><path d="M8 11l3 3"/></Icon>;
        const BookOpen = (props) => <Icon {...props}><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></Icon>;
        const CheckCircle2 = (props) => <Icon {...props}><path d="M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10z"/><path d="m9 12 2 2 4-4"/></Icon>;
        const XCircle = (props) => <Icon {...props}><circle cx="12" cy="12" r="10"/><path d="m15 9-6 6"/><path d="m9 9 6 6"/></Icon>;
        const ArrowRight = (props) => <Icon {...props}><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></Icon>;
        const RotateCcw = (props) => <Icon {...props}><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></Icon>;
        const Trophy = (props) => <Icon {...props}><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/></Icon>;
        const ChevronRight = (props) => <Icon {...props}><path d="m9 18 6-6-6-6"/></Icon>;
        const Info = (props) => <Icon {...props}><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></Icon>;
        const ExternalLink = (props) => <Icon {...props}><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></Icon>;
        const Settings = (props) => <Icon {...props}><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></Icon>;

        /* APP */
        function App() {
            const [gameState, setGameState] = useState('welcome');
            const [categories, setCategories] = useState(['Orthographe grammaticale', 'Lexique']);
            const [limit, setLimit] = useState(10);
            const [sessionQuestions, setSessionQuestions] = useState([]);
            const [currentIndex, setCurrentIndex] = useState(0);
            const [selectedAnswer, setSelectedAnswer] = useState(null);
            const [showFeedback, setShowFeedback] = useState(false);
            const [score, setScore] = useState(0);
            const [history, setHistory] = useState([]);

            const currentQuestion = sessionQuestions[currentIndex];

            const toggleCategory = (cat) => {
                if (categories.includes(cat)) {
                    if (categories.length > 1) setCategories(categories.filter(c => c !== cat));
                } else {
                    setCategories([...categories, cat]);
                }
            };

            const handleStartSession = () => {
                const filtered = QUIZ_DATA.filter(q => categories.includes(q.category));
                const shuffled = shuffleArray(filtered);
                const final = shuffled.slice(0, Math.min(limit, shuffled.length));
                
                setSessionQuestions(final);
                setCurrentIndex(0);
                setScore(0);
                setHistory([]);
                setSelectedAnswer(null);
                setShowFeedback(false);
                setGameState('playing');
            };

            const handleAnswerSelect = (index) => {
                if (showFeedback) return;
                setSelectedAnswer(index);
                setShowFeedback(true);
                const isCorrect = index === currentQuestion.correctAnswer;
                if (isCorrect) setScore(s => s + 1);
                setHistory([...history, { question: currentQuestion, isCorrect, selected: index }]);
            };

            const handleNext = () => {
                if (currentIndex < sessionQuestions.length - 1) {
                    setCurrentIndex(prev => prev + 1);
                    setSelectedAnswer(null);
                    setShowFeedback(false);
                } else {
                    setGameState('finished');
                }
            };

            const resetAll = () => {
                setGameState('welcome');
            };

            return (
                <div className="app-container">
                    <div className="max-width">
                        <header className="header">
                            <div className="logo-group">
                                <div className="logo-icon"><BrainCircuit size={24} /></div>
                                <div className="logo-text"><h1>TECFÉE Expert</h1><div className="logo-badge">Norme BDL / OQLF</div></div>
                            </div>
                            {gameState === 'playing' && <div className="progress-counter">{currentIndex + 1} / {sessionQuestions.length}</div>}
                        </header>

                        {/* WELCOME */}
                        {gameState === 'welcome' && (
                            <div className="card text-center animate-fade-in">
                                <div className="welcome-icon-box"><BookOpen size={48} /></div>
                                <h2 className="welcome-title">Étude Personnalisée</h2>
                                <p className="welcome-desc">Configurez votre session de révision du TECFÉE.</p>
                                
                                <div className="mt-10" style={{ textAlign: 'left' }}>
                                    <p style={{ fontSize: '12px', fontWeight: '900', color: '#94a3b8', textTransform: 'uppercase', marginBottom: '1rem' }}>Catégories à réviser</p>
                                    <div style={{ display: 'flex', flexWrap: 'wrap', gap: '0.5rem', marginBottom: '2rem' }}>
                                        {['Orthographe grammaticale', 'Syntaxe', 'Lexique', 'Ponctuation'].map(cat => (
                                            <button 
                                                key={cat}
                                                onClick={() => toggleCategory(cat)}
                                                className={`category-tag`}
                                                style={{ 
                                                    cursor: 'pointer',
                                                    background: categories.includes(cat) ? 'var(--primary)' : '#f1f5f9',
                                                    color: categories.includes(cat) ? 'white' : '#64748b',
                                                    border: 'none'
                                                }}
                                            >
                                                {cat}
                                            </button>
                                        ))}
                                    </div>

                                    <p style={{ fontSize: '12px', fontWeight: '900', color: '#94a3b8', textTransform: 'uppercase', marginBottom: '1rem' }}>Nombre de questions</p>
                                    <div style={{ display: 'flex', gap: '0.5rem', marginBottom: '2rem' }}>
                                        {[5, 10, 20, 50].map(n => (
                                            <button 
                                                key={n}
                                                onClick={() => setLimit(n)}
                                                className="progress-counter"
                                                style={{ 
                                                    cursor: 'pointer',
                                                    background: limit === n ? 'var(--primary-light)' : 'white',
                                                    borderColor: limit === n ? 'var(--primary)' : '#f1f5f9',
                                                    color: limit === n ? 'var(--primary)' : '#64748b'
                                                }}
                                            >
                                                {n === 50 ? 'Max' : n}
                                            </button>
                                        ))}
                                    </div>
                                </div>

                                <button onClick={handleStartSession} className="btn-primary">Lancer le quiz <ChevronRight size={24} /></button>
                            </div>
                        )}

                        {/* PLAYING */}
                        {gameState === 'playing' && (
                            <div className="animate-fade-in">
                                <div className="progress-bar-container"><div className="progress-bar-fill" style={{ width: `${((currentIndex) / sessionQuestions.length) * 100}%` }}></div></div>
                                <div className="card">
                                    <div className="category-tag">{currentQuestion.category}</div>
                                    <h3 className="question-text">{currentQuestion.question}</h3>
                                    <div className="options-list">
                                        {currentQuestion.options.map((option, idx) => (
                                            <button key={idx} disabled={showFeedback} onClick={() => handleAnswerSelect(idx)}
                                                className={`option-btn ${showFeedback ? (idx === currentQuestion.correctAnswer ? 'correct' : (idx === selectedAnswer ? 'wrong' : 'disabled')) : (selectedAnswer === idx ? 'selected' : '')}`}>
                                                <span>{option}</span>
                                                {showFeedback && (idx === currentQuestion.correctAnswer ? <CheckCircle2 size={24} /> : (idx === selectedAnswer ? <XCircle size={24} /> : null))}
                                            </button>
                                        ))}
                                    </div>
                                    {showFeedback && (
                                        <div className="feedback-box animate-fade-in">
                                            <div className="feedback-header">
                                                <div className="feedback-icon" style={{ background: selectedAnswer === currentQuestion.correctAnswer ? '#d1fae5' : '#fef3c7', color: selectedAnswer === currentQuestion.correctAnswer ? '#059669' : '#d97706' }}><Info size={24} /></div>
                                                <div className="feedback-content">
                                                    <p className="label">Justification BDL</p>
                                                    <p className="feedback-text">{currentQuestion.explanation}</p>
                                                    <a href={currentQuestion.bdlLink} target="_blank" rel="noopener noreferrer" className="bdl-link">Consulter l'article officiel <ExternalLink size={16} /></a>
                                                </div>
                                            </div>
                                        </div>
                                    )}
                                    {showFeedback && <button onClick={handleNext} className="btn-primary mt-10">{currentIndex < sessionQuestions.length - 1 ? 'Question suivante' : 'Voir mon score'} <ArrowRight size={24} /></button>}
                                </div>
                            </div>
                        )}

                        {/* FINISHED */}
                        {gameState === 'finished' && (
                            <div className="card text-center animate-fade-in">
                                <div className="welcome-icon-box" style={{ background: '#fffbeb', color: '#f59e0b' }}><Trophy size={56} /></div>
                                <h2 className="welcome-title">Résultats</h2>
                                <div className="mt-10"><div className="results-score">{score} <span>/ {sessionQuestions.length}</span></div><p style={{ color: '#64748b', fontWeight: 'bold', fontSize: '1.125rem' }}>{score === sessionQuestions.length ? "Parfait !" : "Continuez vos efforts !"}</p></div>
                                <div className="mt-10" style={{ maxHeight: '300px', overflowY: 'auto', padding: '1rem', border: '1px solid #f1f5f9', borderRadius: '1rem' }}>
                                    {history.map((item, idx) => (<div key={idx} className="history-item">{item.isCorrect ? <CheckCircle2 size={20} color="#10b981" /> : <XCircle size={20} color="#ef4444" />}<span className="history-text">Q{idx + 1}: {item.question.topic}</span></div>))}</div>
                                <button onClick={resetAll} className="btn-primary mt-10" style={{ background: '#0f172a' }}><Settings size={24} /> Nouvelle session</button>
                            </div>
                        )}

                        <footer className="mt-16 text-center">
                            <p style={{ fontSize: '10px', fontWeight: '900', color: '#94a3b8', textTransform: 'uppercase', letterSpacing: '0.1em', marginBottom: '0.5rem' }}>TECFÉE Expert • OQLF</p>
                        </footer>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(React.createElement(App));
    </script>
</body>
</html>
